<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>News</h1>
    <ul id="news-list">
    </ul>

    <script>
        const formatPublishedDate = (dateString) => {
            if (!dateString) return "";
            const dateObj = new Date(dateString);
            return dateObj.toLocaleString("en-US", { 
                weekday: "long", 
                month: "long", 
                day: "numeric", 
                hour: "numeric", 
                minute: "2-digit" 
            }).replace(' at ', ' '); // Tweak to remove the 'at' from the default formatting if present
        };

        fetch("https://swisscheese-production.up.railway.app/news")
            .then(response => response.json())
            .then(data => {
                const newsList = document.querySelector("ul");
                data.forEach(item => {
                    const li = document.createElement("li");
                    const dateText = formatPublishedDate(item.published);
                    li.innerHTML = `<strong>${item.title}</strong><br><small>${dateText}</small>`;
                    newsList.appendChild(li);
                });
            });
        
        fetch("https://swisscheese-production.up.railway.app/news/breaking")
            .then(response => response.json())
            .then(data => {
                const breakingNewsList = document.querySelector("ul");
                data.forEach(item => {
                    const li = document.createElement("li");
                    const dateText = formatPublishedDate(item.published);
                    li.innerHTML = `<strong>${item.title}</strong><br><small>${dateText}</small>`;
                    breakingNewsList.appendChild(li);
                });
            });
    </script>
</body>
</html>
