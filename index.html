<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Timezone Grid Clock</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="web/style.css">
  <script src="web/script.js" defer></script>
</head>

<body>
  <div class="page">
    <div id="breaking-news-section" style="display: none;">
      <h1 class="news-title">Breaking News</h1>
      <div class="grid-wrap" style="margin-bottom: 24px;">
        <div class="tz-list" id="breaking-news-list"></div>
      </div>
    </div>
    <div class="header">
      <span class="header-label">world clocks | <span id="utc-clock">00:00:00</span> (UTC)</span>
    </div>
    <div class="grid-wrap">
      <div class="tz-grid" id="grid"></div>
    </div>
    <div class="news-wrap">
      <h1>News</h1>
      <div class="grid-wrap">
        <div class="tz-list" id="news-list"></div>
      </div>
    </div>
  </div>
</body>

</html>
