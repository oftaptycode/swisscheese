<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Timezone Grid Clock</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="web/style.css">
</head>

<body>
  <div class="page">
    <div id="breaking-news-section" style="display: none;">
      <h1 class="news-title">Breaking News</h1>
      <div class="grid-wrap" style="margin-bottom: 24px;">
        <div class="tz-list" id="breaking-news-list"></div>
      </div>
    </div>
    <div class="header">
      <span class="header-label">world clocks</span>
    </div>
    <div class="grid-wrap">
      <div class="tz-grid" id="grid"></div>
    </div>
    <div class="news-wrap">
      <h1>News</h1>
      <div class="grid-wrap">
        <div class="tz-list" id="news-list"></div>
      </div>
      <script>
        const seenIDs = new Set();

        const formatPublishedDate = (dateString) => {
          if (!dateString) return "";
          const dateObj = new Date(dateString);
          return dateObj.toLocaleString("en-US", {
            weekday: "long",
            month: "long",
            day: "numeric",
            hour: "numeric",
            minute: "2-digit"
          }).replace(' at ', ' ');
        };

        function makeCard(item, extraClass = "") {
          const card = document.createElement("div");
          card.className = "tz-card" + (extraClass ? " " + extraClass : "");
          if (item.level === 'active active-critical') card.classList.add("critical");
          card.innerHTML = `
            <div class="tz-top">
              <a href="${item.url}" target="_blank" class="tz-city news-card-title ${extraClass}">${item.title}</a>
            </div>
            <div class="tz-date">${formatPublishedDate(item.published)}</div>`;
          return card;
        }

        function fitBreakingNews() {
          const section = document.getElementById("breaking-news-section");
          if (section.style.display === "none") return;

          const vh = window.innerHeight;
          let fontSize = 24;
          const minSize = 10;

          const titles = section.querySelectorAll(".breaking-news-card-title");
          const dates = section.querySelectorAll(".tz-date");
          const cards = section.querySelectorAll(".tz-card");
          const heading = section.querySelector(".news-title");

          while (fontSize > minSize) {
            const pad = Math.max(fontSize * 0.5, 6);
            titles.forEach(t => t.style.fontSize = fontSize + "px");
            dates.forEach(d => d.style.fontSize = Math.max(fontSize * 0.5, 9) + "px");
            cards.forEach(c => c.style.padding = pad + "px " + pad + "px");

            if (section.scrollHeight <= vh) break;
            fontSize -= 1;
          }
        }

        window.addEventListener("resize", fitBreakingNews);

        async function pollNews() {
          const [newsRes, breakingRes] = await Promise.all([
            fetch("https://swisscheese-production.up.railway.app/news"),
            fetch("https://swisscheese-production.up.railway.app/news/breaking")
          ]);
          const news = await newsRes.json();
          const breaking = await breakingRes.json();

          const newsList = document.getElementById("news-list");
          const breakingList = document.getElementById("breaking-news-list");
          const breakingSection = document.getElementById("breaking-news-section");

          // Collect unseen items, reverse so newest ends up on top after prepend
          const newItems = news.filter(item => !seenIDs.has(item.id));
          newItems.reverse().forEach(item => {
            seenIDs.add(item.id);
            newsList.prepend(makeCard(item));
          });

          // Rebuild breaking news each poll — drop items older than 24 hours
          const twentyFourHoursAgo = Date.now() - 24 * 60 * 60 * 1000;
          const freshBreaking = breaking.filter(item => new Date(item.published).getTime() > twentyFourHoursAgo);

          breakingList.innerHTML = "";
          if (freshBreaking.length > 0) {
            breakingSection.style.display = "block";
            freshBreaking.slice(0, 5).forEach(item => breakingList.appendChild(makeCard(item, "flashing breaking-news-card-title")));
            fitBreakingNews();
          } else {
            breakingSection.style.display = "none";
          }
        }

        pollNews();
        setInterval(pollNews, 10000);
      </script>
    </div>

    <script>
      const zones = [
        // { city: 'Honolulu',    tz: 'Pacific/Honolulu' },
        // { city: 'Anchorage',   tz: 'America/Anchorage' },
        // { city: 'Los Angeles', tz: 'America/Los_Angeles' },
        // { city: 'Denver',      tz: 'America/Denver' },
        // { city: 'Chicago',     tz: 'America/Chicago' },
        { city: 'New York', tz: 'America/New_York' },
        // { city: 'Toronto',     tz: 'America/Toronto' },
        // { city: 'São Paulo',   tz: 'America/Sao_Paulo' },
        // { city: 'Reykjavik',   tz: 'Atlantic/Reykjavik' },
        { city: 'London', tz: 'Europe/London' },
        // { city: 'Paris',       tz: 'Europe/Paris' },
        // { city: 'Berlin',      tz: 'Europe/Berlin' },
        // { city: 'Cairo',       tz: 'Africa/Cairo' },
        // { city: 'Nairobi',     tz: 'Africa/Nairobi' },
        // { city: 'Moscow',      tz: 'Europe/Moscow' },
        // { city: 'Dubai',       tz: 'Asia/Dubai' },
        // { city: 'Mumbai',      tz: 'Asia/Kolkata' },
        // { city: 'Jakarta',     tz: 'Asia/Jakarta' },
        // { city: 'Bangkok',     tz: 'Asia/Bangkok' },
        // { city: 'Singapore',   tz: 'Asia/Singapore' },
        // { city: 'Shanghai',    tz: 'Asia/Shanghai' },
        { city: 'Tokyo', tz: 'Asia/Tokyo' },
        // { city: 'Seoul',       tz: 'Asia/Seoul' },
        { city: 'Sydney', tz: 'Australia/Sydney' },
        // { city: 'Auckland',    tz: 'Pacific/Auckland' },
      ];

      function getOffset(tz) {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'shortOffset' });
        const parts = fmt.formatToParts(now);
        const off = parts.find(p => p.type === 'timeZoneName')?.value || '';
        return off.replace('GMT', 'UTC');
      }

      function getParts(tz) {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat('en-US', {
          timeZone: tz,
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false, weekday: 'short', month: 'short', day: 'numeric'
        });
        const parts = fmt.formatToParts(now);
        const get = t => parts.find(p => p.type === t)?.value || '';
        let h = get('hour'), m = get('minute'), s = get('second');
        if (h === '24') h = '00';
        const hNum = parseInt(h, 10);
        const isDay = hNum >= 6 && hNum < 20;
        const dateStr = `${get('weekday')} ${get('month')} ${get('day')}`;
        return { h, m, s, isDay, dateStr };
      }

      const grid = document.getElementById('grid');
      const offsets = zones.map(z => getOffset(z.tz));

      const continentColors = {
        America: '255, 123, 114',
        Europe: '126, 231, 135',
        Asia: '210, 168, 255',
        Australia: '121, 192, 255',
        Africa: '255, 176, 0',
        Pacific: '57, 197, 207',
        Atlantic: '242, 204, 96'
      };

      zones.forEach((z, i) => {
        const continent = z.tz.split('/')[0];
        const rgb = continentColors[continent] || '126, 184, 247';
        const card = document.createElement('div');
        card.className = 'tz-card';
        card.id = 'card-' + i;
        card.innerHTML = `
  <div class="tz-top">
    <span class="tz-city">${z.city}</span>
    <span class="tz-offset" style="--c: ${rgb}">${offsets[i]}</span>
  <\/div>
  <div class="tz-time" id="time-${i}"><\/div>
  <div class="tz-date" id="date-${i}"><\/div>
`;
        grid.appendChild(card);
      });

      function tick() {
        zones.forEach((z, i) => {
          const { h, m, s, dateStr } = getParts(z.tz);
          const timeEl = document.getElementById('time-' + i);
          const dateEl = document.getElementById('date-' + i);
          timeEl.innerHTML = `${h}:${m}<span class="sec">:${s}</span>`;
          dateEl.textContent = dateStr;
        });
      }

      tick();
      setInterval(tick, 1000);
    </script>
</body>

</html>
